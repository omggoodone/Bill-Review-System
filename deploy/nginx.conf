# 票据审核系统 Nginx 配置
# 部署路径: /etc/nginx/conf.d/bill.conf

server {
    listen 80;
    server_name localhost;  # 替换为实际域名

    # 前端静态文件目录
    root /opt/bill-review/dist;
    index index.html;

    # 字符集
    charset utf-8;

    # 日志
    access_log /opt/bill-review/logs/nginx-access.log;
    error_log  /opt/bill-review/logs/nginx-error.log;

    # Vue History 模式 — 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 转发到后端（Spring Boot）
    location /prod-api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1k;
    gzip_comp_level 6;
}
